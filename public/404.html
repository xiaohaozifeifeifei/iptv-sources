<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>404 - 页面不存在</title>
        <style>
            body {
                margin: 0;
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                font-family: Arial, sans-serif;
                background-color: #f5f5f5;
                color: #333;
            }

            .container {
                text-align: center;
                padding: 32px 24px;
                background: #fff;
                border-radius: 12px;
                box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            }

            h1 {
                margin: 0 0 12px;
                font-size: 48px;
            }

            p {
                margin: 0 0 20px;
                color: #666;
            }

            a {
                color: #0366d6;
                text-decoration: none;
            }

            a:hover {
                text-decoration: underline;
            }
        </style>
    </head>
    <body>
        <main class="container">
            <h1>404</h1>
            <p>你访问的页面不存在。</p>
            <a href="/">返回首页</a>
        </main>
    </body>
</html>
